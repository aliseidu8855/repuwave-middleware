# =============================================================================
# Repuwave — HAProxy edge config (JA3-capable frontend)
# =============================================================================
# Use HAProxy in front of (or instead of) NGINX when you want a real JA3
# fingerprint. HAProxy can capture the TLS ClientHello and compute a JA3 via a
# small Lua script (haproxy-lua-ja3 or equivalent). This config:
#   - terminates TLS,
#   - computes a JA3 and sets a SANITIZED X-JA3-Fingerprint (any client-sent
#     value is deleted first — the header cannot be spoofed),
#   - applies per-IP rate limiting,
#   - forwards to the Django API / dashboard.
#
# Load the JA3 Lua at global scope:  lua-load /etc/haproxy/ja3.lua
# (See https://github.com/... for a maintained ja3 Lua; the fetch used below
#  is `txn.f:ssl_fc_ja3()` if your build/module exposes it, otherwise the Lua
#  sample fetch `ja3` it registers.)

global
    log stdout format raw local0
    lua-load /etc/haproxy/ja3.lua
    ssl-default-bind-options ssl-min-ver TLSv1.2

defaults
    mode http
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    option httplog
    log global

# Per-IP rate limiting via stick-tables.
backend st_per_ip
    stick-table type ip size 1m expire 60s store http_req_rate(60s)

frontend https_in
    bind :443 ssl crt /etc/haproxy/certs/repuwave.pem
    bind :80
    http-request redirect scheme https unless { ssl_fc }

    # --- HEADER HYGIENE: delete any client-supplied trust headers first -----
    http-request del-header X-JA3-Fingerprint
    http-request del-header X-Forwarded-Proto

    # --- Compute + set the trusted JA3 --------------------------------------
    # `ja3` is the sample fetch registered by the Lua script. Fall back to ""
    # if unavailable so downstream behaves as "no JA3".
    http-request set-header X-JA3-Fingerprint %[lua.ja3]
    http-request set-header X-Forwarded-Proto https if { ssl_fc }

    # --- Per-IP rate limit --------------------------------------------------
    http-request track-sc0 src table st_per_ip
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 1200 }

    # --- Routing ------------------------------------------------------------
    acl is_api path_beg /v1/ /health/ /admin/ /static/
    use_backend api_backend if is_api
    default_backend dashboard_backend

backend api_backend
    balance roundrobin
    option forwardfor
    server api1 api:8000 check

backend dashboard_backend
    balance roundrobin
    server dash1 dashboard:80 check
