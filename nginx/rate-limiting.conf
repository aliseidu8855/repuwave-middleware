# =============================================================================
# Repuwave — NGINX rate-limit zones (include from the http{} context)
# =============================================================================
# Per-IP sliding-window limits at the edge. These are the FIRST line of
# defense; the app additionally applies a per-service throttle and a per-UAID
# velocity throttle. Tune the rates to your traffic profile.

# Verify/report/authorize traffic: generous, high-throughput.
limit_req_zone $binary_remote_addr zone=api_per_ip:16m rate=1200r/m;

# Unauthenticated auth endpoints (register/login/token): strict.
limit_req_zone $binary_remote_addr zone=auth_per_ip:8m rate=50r/m;

# Global connection cap per IP.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:16m;

# Return 429 (not the nginx default 503) so clients back off correctly.
limit_req_status 429;
limit_conn_status 429;
