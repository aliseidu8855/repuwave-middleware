# =============================================================================
# Repuwave — NGINX security headers (include from inside each server{} block)
# =============================================================================

# HSTS — force HTTPS for a year (matches the app's SECURE_HSTS_SECONDS).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# The API returns JSON only; a strict CSP is safe. The dashboard SPA is a
# separate origin/host and can relax this as needed.
add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

# Never leak the nginx version.
server_tokens off;
