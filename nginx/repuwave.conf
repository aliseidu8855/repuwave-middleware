# =============================================================================
# Repuwave — NGINX edge / ingress gateway
# =============================================================================
# Terminates TLS, enforces per-IP rate limits, performs HEADER HYGIENE so
# internal trust headers cannot be spoofed by clients, and proxies /v1 to the
# Django API and everything else to the dashboard.
#
# Include the companion files from the http{} context:
#     include /etc/nginx/conf.d/rate-limiting.conf;   # limit_req_zone defs
# and reference security.conf from inside the server blocks below.
#
# ---------------------------------------------------------------------------
# TRUST BOUNDARY (read this before changing header handling)
# ---------------------------------------------------------------------------
# The Django AntiAbuseMiddleware trusts `X-JA3-Fingerprint` to block banned
# TLS clients. That header MUST be set by this edge and MUST NOT be accepted
# from clients — otherwise a banned client simply omits/rewrites it and the
# blocklist is meaningless. We therefore blank any incoming value and only
# forward a fingerprint we set ourselves.
#
# NGINX does not compute a true JA3 (MD5 of the TLS ClientHello) on its own.
# Options, in order of fidelity:
#   1. Front NGINX with a JA3-capable layer (HAProxy w/ the ja3 fetch, or a
#      CDN/WAF such as Cloudflare) that injects a real JA3, and forward it
#      here after re-sanitizing. See haproxy/repuwave.cfg.
#   2. Build NGINX with a JA3 module (e.g. nginx-module-ja3) and set
#      $http_ssl_ja3 into the header below.
#   3. Ship without JA3 blocking (the blocklist set simply stays empty) and
#      rely on IP rate limiting + the app-layer velocity throttle.
# The `map` below defaults the fingerprint to "" so option 3 is safe.
# ---------------------------------------------------------------------------

# Default the trusted JA3 value to empty unless a JA3-capable module sets it.
# Replace `$ssl_ja3_placeholder` with your module's variable (e.g. $http_ssl_ja3
# from nginx-module-ja3) when you enable option 2.
map $host $repuwave_ja3 {
    default "";
}

upstream repuwave_api {
    server ${API_UPSTREAM};        # e.g. api:8000
    keepalive 32;
}

upstream repuwave_dashboard {
    server ${DASHBOARD_UPSTREAM};  # e.g. dashboard:80
}

# --- HTTP → HTTPS redirect --------------------------------------------------
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- Main TLS server --------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name ${SERVER_NAME};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    include /etc/nginx/conf.d/security.conf;

    client_max_body_size 1m;

    # -----------------------------------------------------------------------
    # HEADER HYGIENE — strip client-supplied internal/trust headers.
    # Setting these to "" here means any value a client sent is discarded;
    # only the value we assign (below) reaches the app.
    # -----------------------------------------------------------------------
    proxy_set_header X-JA3-Fingerprint $repuwave_ja3;
    # Real client IP for the app's logging (X-Forwarded-For is set by proxy).
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header Host             $host;

    # Note: X-Repuwave-UAID is legitimately client-set (agents send it), so it
    # is passed through unchanged. The app treats it as an UNAUTHENTICATED
    # claim — it drives throttling only, never a reputation penalty.

    # --- API ---------------------------------------------------------------
    location /v1/ {
        limit_req zone=api_per_ip burst=200 nodelay;
        limit_req_status 429;
        proxy_pass http://repuwave_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/ {
        proxy_pass http://repuwave_api;
        access_log off;
    }

    location /admin/ {
        # Optionally restrict to an allowlist:
        #   allow 10.0.0.0/8; deny all;
        proxy_pass http://repuwave_api;
    }

    # Django static (WhiteNoise serves them; proxy through).
    location /static/ {
        proxy_pass http://repuwave_api;
    }

    # --- Dashboard (SPA) ---------------------------------------------------
    location / {
        proxy_pass http://repuwave_dashboard;
    }
}
